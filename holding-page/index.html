<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0f19;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    .container { width: 100%; max-width: 720px; }
    .ad-slot {
      background: rgba(255, 255, 255, 0.04);
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #9ca3af; line-height: 1.6; margin-bottom: 20px; }
    .countdown {
      font-size: 2.5rem;
      font-weight: 700;
      color: #8b5cf6;
      margin: 16px 0;
    }
    .continue-btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .continue-btn.enabled {
      opacity: 1;
      pointer-events: auto;
    }
    .continue-btn.enabled:hover { opacity: 0.9; }
    .error { color: #f87171; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="ad-slot" id="ad-top">
      <!-- Replace with your ad code (e.g. Google AdSense) -->
      Advertisement
    </div>

    <div class="card" id="loading-state">
      <div class="spinner"></div>
      <h1>Preparing your link</h1>
      <p>Please wait while we verify the destination...</p>
    </div>

    <div class="card hidden" id="holding-state">
      <h1>You are being redirected</h1>
      <p>Your destination will open in a moment. Thank you for your patience.</p>
      <div class="countdown" id="countdown">5</div>
      <button class="continue-btn" id="continue-btn" type="button">Continue to destination</button>
    </div>

    <div class="card hidden" id="error-state">
      <h1 class="error">Link Not Found</h1>
      <p id="error-message">The shortened link you are trying to access does not exist or has expired.</p>
    </div>

    <div class="ad-slot" id="ad-bottom" style="margin-top: 20px;">
      <!-- Replace with your ad code (e.g. Google AdSense) -->
      Advertisement
    </div>
  </div>

  <script>
    window.HOLDING_PAGE_CONFIG = {
      shortenerApiUrl: 'https://app.trixam.com',
      countdownSeconds: 5,
    };
  </script>
  <script>
    (function () {
      const config = window.HOLDING_PAGE_CONFIG || {};
      const countdownSeconds = config.countdownSeconds || 5;
      const apiBase = (config.shortenerApiUrl || '').replace(/\/$/, '');

      const loadingState = document.getElementById('loading-state');
      const holdingState = document.getElementById('holding-state');
      const errorState = document.getElementById('error-state');
      const countdownEl = document.getElementById('countdown');
      const continueBtn = document.getElementById('continue-btn');
      const errorMessage = document.getElementById('error-message');

      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const shortCode = pathParts[pathParts.length - 1];

      if (!shortCode || !apiBase) {
        showError('Invalid link configuration.');
        return;
      }

      let destinationUrl = null;
      let redirectType = 302;
      let remaining = countdownSeconds;
      let timerId = null;

      continueBtn.addEventListener('click', () => {
        if (destinationUrl) {
          window.location.href = destinationUrl;
        }
      });

      function showError(message) {
        loadingState.classList.add('hidden');
        holdingState.classList.add('hidden');
        errorState.classList.remove('hidden');
        errorMessage.textContent = message;
      }

      function showHolding() {
        loadingState.classList.add('hidden');
        holdingState.classList.remove('hidden');
        countdownEl.textContent = String(remaining);
        timerId = setInterval(() => {
          remaining -= 1;
          countdownEl.textContent = String(Math.max(remaining, 0));
          if (remaining <= 0) {
            clearInterval(timerId);
            continueBtn.classList.add('enabled');
            continueBtn.textContent = 'Continue to destination';
            if (destinationUrl) {
              window.location.href = destinationUrl;
            }
          }
        }, 1000);
      }

      fetch(`${apiBase}/api/resolve/${encodeURIComponent(shortCode)}`)
        .then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || 'Shortened URL not found');
          }
          destinationUrl = data.originalUrl;
          redirectType = data.redirectType || 302;
          showHolding();
        })
        .catch((err) => {
          showError(err.message || 'Unable to resolve this link.');
        });
    })();
  </script>
</body>
</html>
