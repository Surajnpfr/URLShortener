# drovashop.com nginx rules (order matters)
# Copy holding-page/index.html to your web root (e.g. /holding/index.html)

# 1) Holding page — ads + countdown at /r/:code
location ~ ^/r/([a-zA-Z0-9-_]{3,30})$ {
    try_files /holding/index.html =404;
}

# 2) Short links — proxy to backend at app.trixam.com
location ~ ^/go/([a-zA-Z0-9-_]{3,30})$ {
    proxy_pass https://app.trixam.com;
    proxy_set_header Host app.trixam.com;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
}

# Alternative for Apache (.htaccess):
# RewriteRule ^r/([a-zA-Z0-9-_]{3,30})$ /holding/index.html [L]
# RewriteRule ^go/([a-zA-Z0-9-_]{3,30})$ https://app.trixam.com/go/$1 [P,L]
