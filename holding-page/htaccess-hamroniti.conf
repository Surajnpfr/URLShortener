# ==============================
# LSCACHE (LiteSpeed Cache)
# ==============================
<IfModule mod_rewrite.c>
RewriteEngine On
RewriteRule litespeed/debug/.*\.log$ - [F,L]
RewriteRule \.litespeed_conf\.dat - [F,L]
</IfModule>

<IfModule LiteSpeed>
CacheLookup On
RewriteRule .* - [E=Cache-Control:no-autoflush]

# Don't cache URL shortener routes
RewriteRule ^r/ - [E=cache-control:no-cache]
RewriteRule ^go/ - [E=cache-control:no-cache]

RewriteCond %{REQUEST_URI} /wp-admin/admin-ajax\.php
RewriteCond %{QUERY_STRING} action=async_litespeed
RewriteRule .* - [E=noabort:1]

CacheKeyModify -qs:fbclid
CacheKeyModify -qs:gclid
CacheKeyModify -qs:utm*
CacheKeyModify -qs:_ga
</IfModule>

# ==============================
# BROWSER CACHE
# ==============================
<IfModule mod_expires.c>
ExpiresActive on

ExpiresByType image/jpg A31557600
ExpiresByType image/jpeg A31557600
ExpiresByType image/png A31557600
ExpiresByType image/gif A31557600
ExpiresByType image/webp A31557600
ExpiresByType image/avif A31557600
ExpiresByType image/svg+xml A31557600

ExpiresByType text/css A31557600
ExpiresByType text/javascript A31557600
ExpiresByType application/javascript A31557600

ExpiresByType application/pdf A31557600
ExpiresByType font/woff2 A31557600
</IfModule>

# ==============================
# URL SHORTENER (hamroniti.com)
# ==============================
<IfModule mod_rewrite.c>
RewriteEngine On

# -----------------------------------
# 1. Protect WordPress core folders
# -----------------------------------
RewriteRule ^wp-admin(/.*)?$ - [L]
RewriteRule ^wp-content(/.*)?$ - [L]
RewriteRule ^wp-includes(/.*)?$ - [L]
RewriteRule ^wp-json(/.*)?$ - [L]
RewriteRule ^index\.php$ - [L]

# -----------------------------------
# 2. Holding page — hamroniti.com/r/CODE
# Serves public_html/holding/index.html
# -----------------------------------
RewriteRule ^r/([A-Za-z0-9_-]{3,30})/?$ /holding/index.html [L]

# -----------------------------------
# 3. Short links — hamroniti.com/go/CODE → backend
# -----------------------------------
RewriteRule ^go/([A-Za-z0-9_-]{3,30})/?$ https://app.drovashop.com/go/$1 [R=302,L]

# -----------------------------------
# 4. Do NOT break real files/folders
# (holding/index.html, uploads, etc.)
# -----------------------------------
RewriteCond %{REQUEST_FILENAME} -f [OR]
RewriteCond %{REQUEST_FILENAME} -d
RewriteRule ^ - [L]

</IfModule>

# ==============================
# WORDPRESS CORE RULES (DO NOT EDIT)
# ==============================
# BEGIN WordPress
<IfModule mod_rewrite.c>
RewriteEngine On
RewriteBase /

RewriteRule ^index\.php$ - [L]

RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule . /index.php [L]
</IfModule>
# END WordPress
